services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: autonomous-mower-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  postgres:
    image: postgis/postgis:16-3.4
    container_name: autonomous-mower-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mower}
      POSTGRES_USER: ${POSTGRES_USER:-mower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mower}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mosquitto-data:
  mosquitto-log:
  postgres-data:
